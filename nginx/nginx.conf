events {}

http {

    server {
        listen 80;
        server_name localhost;

        # Root folder
        root /usr/share/nginx/html;
        # Default file to serve
        index index.html;
        # Serve / route explicitly
        location / {
            try_files /index.html =404;
        }
        location /icons/ {
            alias /usr/share/nginx/html/icons/;
        }


        # Public auth routes
        location ~ ^/(singin|singup|auth|doc)$ {
            proxy_pass http://host.docker.internal:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # Internal auth check
        location /auth-check {
            internal;
            proxy_pass http://host.docker.internal:3001/verify;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_request_body off;      # optional, if /verify doesn't need body
            proxy_set_header Content-Length ""; # optional, required when body is off

        }
        # 🔴 IMPORTANT: MAP AUTH ERRORS TO JSON
        error_page 401 = @unauthorized;
        # error_page 403 = @forbidden;

        location @unauthorized {
            default_type application/json;
            return 401 '{"statusCode":401,"message":"Unauthorized"}';
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"statusCode":403,"message":"Forbidden"}';
        }



        # # Public
        location ~ ^/user/(health|doc)(/.*)?$ {
            rewrite ^/user/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3002;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # User API
        location /api/user/ {

            auth_request /auth-check;                        # call auth-check first
            auth_request_set $user $upstream_http_x_user; 

            rewrite ^/api/user/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3002/;

            proxy_http_version 1.1;
            proxy_set_header X-User $user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
        

        # Public
        location ~ ^/clustor-user/(health|doc)(/.*)?$ {
            rewrite ^/clustor-user/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3003;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # # clustor-user API
        location /api/clustor-user/ {

            auth_request /auth-check;

            rewrite ^/api/clustor-user/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3003;

            proxy_http_version 1.1;
            proxy_set_header X-User $user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }


        # Public
        location ~ ^/calendspece/(health|doc)(/.*)?$ {
            rewrite ^/calendspece/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3004;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # # Order API
        location /api/calendspece/ {

            # auth_request /auth-check;

            rewrite ^/api/calendspece/(.*)$ /$1 break;
            proxy_pass http://host.docker.internal:3004;

            proxy_http_version 1.1;
            proxy_set_header X-User $user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

    }
}
